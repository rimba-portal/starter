models:

  Flow\WorkflowBlueprint:
    name: string
    active: boolean default:true
    relationships:
      hasMany: WorkflowNode

  Flow\WorkflowNode:
    workflow_blueprint_id: foreign
    name: string
    type: string index
    relationships:
      belongsTo: WorkflowBlueprint
      hasMany: OutgoingTransition:WorkflowTransition
      hasMany: IncomingTransition:WorkflowTransition

  Flow\WorkflowTransition:
    workflow_blueprint_id: foreign
    from_node_id: foreign
    to_node_id: foreign
    name: string nullable
    condition: text nullable
    relationships:
      belongsTo:
        - WorkflowBlueprint
        - FromNode:WorkflowNode
        - ToNode:WorkflowNode

  Flow\WorkflowInstance:
    workflow_blueprint_id: foreign
    trackable_id: nullable
    trackable_type: nullable
    status: string default:'active'
    timestamps
    relationships:
      belongsTo: WorkflowBlueprint
      morphTo: trackable
      hasMany:
        - WorkflowNodeInstance
        - WorkflowTransitionInstance

  Flow\WorkflowNodeInstance:
    workflow_instance_id: foreign
    workflow_node_id: foreign
    activated_at: timestamp
    completed_at: timestamp nullable
    relationships:
      belongsTo:
        - WorkflowInstance
        - WorkflowNode

  Flow\WorkflowTransitionInstance:
    workflow_instance_id: foreign
    workflow_transition_id: foreign
    executed_at: timestamp
    executed_by_id: nullable foreign users
    relationships:
      belongsTo:
        - WorkflowInstance
        - WorkflowTransition

  Work\WorkPackage:
    name: string
    description: text nullable
    active: boolean default:true
    relationships:
      hasMany: Checklist

  Work\Checklist:
    work_package_id: foreign
    name: string
    sort_order: integer default:0
    relationships:
      belongsTo: WorkPackage
      hasMany: Task

  Work\Task:
    checklist_id: foreign
    description: string
    active: boolean default:true
    relationships:
      belongsTo: Checklist

  WorkflowNodeAttachable:
    workflow_node_id: foreign
    attachable_id: integer
    attachable_type: string
    relationships:
      belongsTo: WorkflowNode

  Work\WorkPackageInstance:
    workflow_instance_id: foreign
    work_package_id: foreign
    status: string default:'active'
    started_at: timestamp nullable
    completed_at: timestamp nullable
    relationships:
      belongsTo:
        - WorkflowInstance
        - WorkPackage
      hasMany:
        - ChecklistInstance
        - TaskInstance

  Work\ChecklistInstance:
    work_package_instance_id: foreign
    checklist_id: foreign
    status: string default:'pending'
    activated_at: timestamp nullable
    completed_at: timestamp nullable
    relationships:
      belongsTo:
        - WorkPackageInstance
        - Checklist

  Work\TaskInstance:
    work_package_instance_id: foreign
    checklist_instance_id: foreign
    task_id: foreign
    assigned_to_id: nullable foreign users
    completed_by_id: nullable foreign users
    is_completed: boolean default:false
    completed_at: timestamp nullable
    relationships:
      belongsTo:
        - WorkPackageInstance
        - ChecklistInstance
        - Task